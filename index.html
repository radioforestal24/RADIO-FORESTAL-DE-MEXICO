 <img src="logo-web.png" alt="Logo de la radio">
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Forestal de México</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1DB954">

<style>

/* 🌑 BASE */
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1a1a1a,#000);
color:white;
}

/* HEADER */
header{
background:rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
padding:15px;
text-align:center;
color:#1DB954;
font-weight:bold;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px 120px 20px;
}

/* BOTÓN */
.btn{
background:#1DB954;
border:none;
padding:16px 30px;
border-radius:50px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.4);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#1ed760;
}

/* LIVE */
.live{
margin-top:10px;
color:red;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* WAVES */
#waves{
display:flex;
justify-content:center;
gap:4px;
margin-top:20px;
height:40px;
}

.bar{
width:5px;
background:#1DB954;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes wave{
0%,100%{height:5px;}
50%{height:40px;}
}

/* 🧠 RESPONSIVE REAL */
@media (max-width:768px){

.hero{
padding:40px 15px 100px 15px;
}

.btn{
width:90%;
font-size:16px;
padding:16px;
}

#waves{
transform:scale(0.8);
}

}

/* 🎧 MINI PLAYER SOLO UNO */
.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#121212;
padding:12px;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* EQ */
.eq{
display:none;
gap:3px;
align-items:flex-end;
height:20px;
margin-left:15px;
}

.eq div{
width:4px;
height:5px;
background:#1DB954;
animation:wave 1s infinite ease-in-out;
}

.eq div:nth-child(2){animation-delay:0.1s;}
.eq div:nth-child(3){animation-delay:0.2s;}
.eq div:nth-child(4){animation-delay:0.3s;}
.eq div:nth-child(5){animation-delay:0.4s;}

</style>

</head>

<body>

<header>
🌲 RADIO FORESTAL DE MÉXICO
</header>

<div class="hero">

<img src="logo-web.png" style="max-width:180px;margin-bottom:20px;">

<button class="btn"
onclick="
var a=document.getElementById('radio');
if(a.paused){
a.play();
document.getElementById('onair').style.display='block';
document.getElementById('eq').style.display='flex';
}else{
a.pause();
document.getElementById('onair').style.display='none';
document.getElementById('eq').style.display='none';
}
">
▶ ESCUCHAR EN VIVO
</button>

<div id="onair" class="live" style="display:none;">🔴 EN VIVO</div>

<div id="waves">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<audio id="radio">
<source src="https://stereomia.ddns.net/stream" type="audio/mpeg">
</audio>

</div>

<!-- PLAYER ÚNICO -->
<div class="player">

<button class="btn"
style="padding:10px 20px;font-size:14px;"
onclick="
var a=document.getElementById('radio');
if(a.paused){a.play();document.getElementById('eq').style.display='flex';}
else{a.pause();document.getElementById('eq').style.display='none';}
">
▶ RADIO
</button>

<div id="eq" class="eq">
<div></div><div></div><div></div><div></div><div></div>
</div>

</div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>

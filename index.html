<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Forestal de México</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */
header{
background:#121212;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
color:#1DB954;
font-weight:bold;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#1DB954;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.btn{
background:#1DB954;
border:none;
padding:16px 30px;
border-radius:50px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.4);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#1ed760;
}

.live{
margin-top:10px;
color:red;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* WAVE */
#waves{
display:flex;
justify-content:center;
gap:4px;
margin-top:20px;
height:40px;
}

.bar{
width:5px;
background:#1DB954;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes wave{
0%,100%{height:5px;}
50%{height:40px;}
}

/* NEWS */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#181818;
padding:15px;
border-radius:12px;
}

.card h3{
color:#1DB954;
}

/* 📱 RESPONSIVE (CELULAR) */
@media (max-width: 768px){

header{
flex-direction:column;
text-align:center;
gap:10px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.hero{
padding:30px 15px;
}

.btn{
width:90%;
font-size:16px;
padding:16px;
}

#waves{
transform:scale(0.8);
}

.container{
grid-template-columns:1fr;
padding:10px;
}

.card{
font-size:14px;
}
}
</style>
</head>

<body>

<header>
🌲 RADIO FORESTAL DE MÉXICO
<nav>
<a href="#">Inicio</a>
<a href="#">Radio</a>
<a href="#">Noticias</a>
<a href="#">Contacto</a>
</nav>
</header>

<div class="hero">

<button class="btn"
onclick="
var a=document.getElementById('radio');
if(a.paused){
a.play();
document.getElementById('onair').style.display='block';
}else{
a.pause();
document.getElementById('onair').style.display='none';
}
">
▶ ESCUCHAR EN VIVO
</button>

<div id="onair" class="live" style="display:none;">🔴 EN VIVO</div>

<audio id="radio">
<source src="https://stereomia.ddns.net/stream" type="audio/mpeg">
</audio>

<div id="waves">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<div class="container">

<div class="card">
<h3>📢 Noticias</h3>
<p>Bienvenido a Radio Forestal de México.</p>
</div>

<div class="card">
<h3>🎶 Música en vivo</h3>
<p>Transmisión 24/7 desde México.</p>
</div>

<div class="card">
<h3>📱 App PWA</h3>
<p>Instala la radio como aplicación.</p>
</div>

</div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>

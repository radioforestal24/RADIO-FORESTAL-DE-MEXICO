<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Forestal de México</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1DB954">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

/* 🌑 BASE */
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1a1a1a,#000);
color:white;
scroll-behavior:smooth;
}

/* HEADER */
header{
background:rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
padding:15px;
text-align:center;
color:#1DB954;
font-weight:bold;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#1DB954;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.btn{
background:#1DB954;
border:none;
padding:16px 30px;
border-radius:50px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.4);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#1ed760;
}

/* LIVE */
.live{
margin-top:10px;
color:red;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* WAVES */
#waves{
display:flex;
justify-content:center;
gap:4px;
margin-top:20px;
height:40px;
}

.bar{
width:5px;
background:#1DB954;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes wave{
0%,100%{height:5px;}
50%{height:40px;}
}

/* 🧭 PORTAL SECCIONES */
section{
padding:20px;
}

/* 📰 NOTICIAS */
.news{
margin-top:20px;
}

textarea{
width:100%;
height:90px;
border-radius:10px;
padding:10px;
}

.news button{
margin-top:10px;
background:#1DB954;
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
cursor:pointer;
}

.news-item{
background:#181818;
padding:10px;
margin-top:10px;
border-radius:10px;
}

/* 📸 INSTAGRAM SLIDER */
.slider{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
scroll-snap-type:x mandatory;
}

.slider img{
width:80%;
max-width:300px;
height:200px;
object-fit:cover;
border-radius:15px;
scroll-snap-align:center;
flex-shrink:0;
box-shadow:0 10px 20px rgba(0,0,0,.4);
}

.slider::-webkit-scrollbar{
display:none;
}

/* 📱 RESPONSIVE */
@media (max-width:768px){

.btn{
width:90%;
}

.slider img{
width:90%;
height:180px;
}

}

</style>

</head>

<body>

<!-- HEADER -->
<header>
🌲 RADIO FORESTAL DE MÉXICO

<nav>
<a href="#inicio">Inicio</a>
<a href="#radio">Radio</a>
<a href="#noticias">Noticias</a>
<a href="#galeria">Galería</a>
</nav>
</header>

<!-- INICIO / RADIO -->
<section id="inicio">

<div class="hero">

<img src="logo-web.png" style="max-width:180px;margin-bottom:20px;">

<button class="btn"
onclick="
var a=document.getElementById('radio');
if(a.paused){
a.play();
document.getElementById('onair').style.display='block';
}else{
a.pause();
document.getElementById('onair').style.display='none';
}
">
▶ ESCUCHAR EN VIVO
</button>

<div id="onair" class="live" style="display:none;">🔴 EN VIVO</div>

<div id="waves">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<audio id="radio">
<source src="https://stereomia.ddns.net/stream" type="audio/mpeg">
</audio>

</div>

</section>

<!-- NOTICIAS -->
<section id="noticias">

<h2>📰 Noticias en Vivo</h2>

<div class="news">

<textarea id="editor" placeholder="Escribe una noticia..."></textarea>
<br>
<button onclick="saveNews()">Guardar noticia</button>

<div id="newsList"></div>

</div>

</section>

<!-- GALERÍA -->
<section id="galeria">

<h2>📸 Galería tipo Instagram</h2>

<div class="slider">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">

</div>

</section>

<script>

/* 📡 Guardar noticias */
function saveNews(){
let text=document.getElementById("editor").value;
if(!text)return;

let news=JSON.parse(localStorage.getItem("news")||"[]");
news.unshift(text);
localStorage.setItem("news",JSON.stringify(news));

loadNews();
document.getElementById("editor").value="";
}

/* 📡 Cargar noticias */
function loadNews(){
let news=JSON.parse(localStorage.getItem("news")||"[]");
let html="";

news.forEach(n=>{
html+=`<div class='news-item'>📰 ${n}</div>`;
});

document.getElementById("newsList").innerHTML=html;
}

loadNews();

/* PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
